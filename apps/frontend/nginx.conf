server {
    listen 80;
    server_name localhost;

    # Root directory where React build files are
    root /usr/share/nginx/html;
    index index.html;

    # ─────────────────────────────────────────────────────────
    # SPA Routing Fix
    # Without this, refreshing on /employees or /projects
    # returns 404 because Nginx looks for a real file
    # This tells Nginx to always serve index.html and let
    # React Router handle the routing
    # ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─────────────────────────────────────────────────────────
    # API Proxy — forwards /api requests to the backend
    # This avoids CORS issues in production
    # ─────────────────────────────────────────────────────────
    location /api {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # ─────────────────────────────────────────────────────────
    # Cache static assets (JS, CSS, images)
    # ─────────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ─────────────────────────────────────────────────────────
    # Security headers
    # ─────────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # ─────────────────────────────────────────────────────────
    # Gzip compression — smaller files = faster loading
    # ─────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
}
